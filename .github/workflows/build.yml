name: Build Flet Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Устанавливаем Flutter SDK принудительно через официальный экшен, 
      # чтобы Flet даже не пытался ничего спрашивать
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Python Dependencies
        run: |
          pip install "flet[all]" google-genai

      # Добавляем флаг --no-interactive, чтобы сборщик работал в тихом режиме
      - name: Build APK via Flet
        run: |
          flet build apk --no-interactive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-agent-release
          path: build/apk/*.apk
          
